name: Build Colibri Sync .NET EXE
on:
  workflow_dispatch:
  push:
    paths:
      - 'sync/ColibriSync/**'
      - '.github/workflows/build-colibri-sync-dotnet.yml'
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish Windows EXE
        run: dotnet publish sync/ColibriSync/ColibriSync.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish
      - name: Copy config example
        run: copy sync\ColibriSync\config.example.json publish\config.example.json
      - uses: actions/upload-artifact@v4
        with:
          name: ColibriSync-DotNet-Windows-v2-1
          path: publish/**
