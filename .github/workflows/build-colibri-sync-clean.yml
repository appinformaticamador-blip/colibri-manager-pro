name: Build Colibri Sync Clean EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'sync/ColibriSync/**'
      - '.github/workflows/build-colibri-sync-clean.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish single EXE
        run: dotnet publish sync/ColibriSync/ColibriSync.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish
      - name: Copy config example
        run: copy sync\ColibriSync\config.example.json publish\config.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColibriSync-Clean-Windows
          path: publish/**
