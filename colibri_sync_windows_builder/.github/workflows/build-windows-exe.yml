name: Build Colibri Sync EXE
on:
  workflow_dispatch:
  push:
    paths:
      - 'colibri_sync.py'
      - 'requirements.txt'
      - '.github/workflows/build-windows-exe.yml'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build EXE
        run: pyinstaller --onefile --name ColibriSync colibri_sync.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ColibriSync-Windows
          path: dist/ColibriSync.exe
